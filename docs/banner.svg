<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" font-family="'Courier New', monospace" role="img" aria-label="InnaIT RBI — Run the web at arm's length">
  <title>InnaIT RBI — Run the web at arm's length</title>

  <style>
    @keyframes blink { 0%,45%{opacity:1} 50%,95%{opacity:.25} 100%{opacity:1} }
    @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes streamR { 0%{transform:translateX(0);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateX(150px);opacity:0} }
    @keyframes streamL { 0%{transform:translateX(0);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateX(-150px);opacity:0} }
    @keyframes wallpulse { 0%,100%{opacity:.35} 50%{opacity:.7} }
    @keyframes pop { 0%{transform:scale(0.9)} 50%{transform:scale(1.04)} 100%{transform:scale(0.9)} }
    @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:1} }
    .scr { animation: floaty 3.2s ease-in-out infinite; }
    .srv { animation: pop 3.8s ease-in-out infinite; transform-origin: center; }
    .caret { animation: blink 1.1s steps(1) infinite; }
    .px-r { animation: streamR 2.4s linear infinite; }
    .px-l { animation: streamL 2.8s linear infinite; }
    .wall rect { animation: wallpulse 2.6s ease-in-out infinite; }
    .tw { animation: twinkle 2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .scr,.srv,.caret,.px-r,.px-l,.wall rect,.tw { animation: none; }
    }
  </style>

  <!-- ===== LEFT: user's little pixel screen ===== -->
  <g class="scr">
    <!-- monitor body (pixel blocks) -->
    <rect x="60" y="70" width="120" height="86" fill="#1f2a1a"/>
    <rect x="68" y="78" width="104" height="66" fill="#eaf3de"/>
    <!-- pixel "video" content -->
    <rect x="74" y="84" width="16" height="16" fill="#7ac943"/>
    <rect x="94" y="84" width="16" height="16" fill="#c0dd97"/>
    <rect x="114" y="84" width="16" height="16" fill="#7ac943"/>
    <rect x="134" y="84" width="16" height="16" fill="#639922"/>
    <rect x="154" y="84" width="12" height="16" fill="#c0dd97"/>
    <rect x="74" y="104" width="16" height="16" fill="#c0dd97"/>
    <rect x="94" y="104" width="16" height="16" fill="#639922"/>
    <rect x="114" y="104" width="16" height="16" fill="#7ac943"/>
    <rect x="134" y="104" width="16" height="16" fill="#c0dd97"/>
    <rect x="154" y="104" width="12" height="16" fill="#7ac943"/>
    <rect x="74" y="124" width="28" height="14" fill="#639922"/>
    <rect x="106" y="124" width="16" height="14" fill="#c0dd97"/>
    <rect x="126" y="124" width="40" height="14" fill="#7ac943"/>
    <!-- stand -->
    <rect x="108" y="156" width="24" height="10" fill="#1f2a1a"/>
    <rect x="92" y="166" width="56" height="8" fill="#1f2a1a"/>
    <!-- cute eyes -->
    <rect x="150" y="90" width="6" height="6" fill="#1f2a1a"/>
    <rect x="162" y="90" width="6" height="6" fill="#1f2a1a"/>
  </g>
  <text x="120" y="196" text-anchor="middle" font-size="13" fill="#5f5e5a" font-weight="bold">YOU</text>
  <text x="120" y="212" text-anchor="middle" font-size="10" fill="#888780">safe pixels</text>

  <!-- ===== MIDDLE: the glass wall ===== -->
  <g class="wall">
    <rect x="382" y="66" width="8" height="18" fill="#7ac943"/>
    <rect x="382" y="90" width="8" height="18" fill="#7ac943"/>
    <rect x="382" y="114" width="8" height="18" fill="#7ac943"/>
    <rect x="382" y="138" width="8" height="18" fill="#7ac943"/>
    <rect x="382" y="162" width="8" height="18" fill="#7ac943"/>
  </g>
  <text x="386" y="204" text-anchor="middle" font-size="10" fill="#639922">glass wall</text>

  <!-- pixels streaming LEFT (video to user) -->
  <g fill="#7ac943">
    <rect class="px-r" x="230" y="96" width="10" height="10"/>
    <rect class="px-r" x="230" y="96" width="10" height="10" style="animation-delay:.8s"/>
    <rect class="px-r" x="230" y="96" width="10" height="10" style="animation-delay:1.6s"/>
  </g>
  <g fill="#c0dd97">
    <rect class="px-r" x="230" y="120" width="8" height="8" style="animation-delay:.4s"/>
    <rect class="px-r" x="230" y="120" width="8" height="8" style="animation-delay:1.2s"/>
  </g>

  <!-- input streaming RIGHT (clicks to server) -->
  <g fill="#888780">
    <rect class="px-l" x="560" y="140" width="8" height="8" style="animation-delay:.2s"/>
    <rect class="px-l" x="560" y="140" width="8" height="8" style="animation-delay:1.0s"/>
    <rect class="px-l" x="560" y="140" width="8" height="8" style="animation-delay:1.8s"/>
  </g>

  <!-- ===== RIGHT: the server robot ===== -->
  <g class="srv">
    <!-- server tower (pixel blocks) -->
    <rect x="596" y="66" width="96" height="100" fill="#1f2a1a"/>
    <rect x="604" y="74" width="80" height="84" fill="#27500a"/>
    <!-- robot face screen -->
    <rect x="614" y="84" width="60" height="34" fill="#eaf3de"/>
    <!-- robot eyes -->
    <rect x="626" y="94" width="10" height="10" fill="#173404" class="tw"/>
    <rect x="652" y="94" width="10" height="10" fill="#173404" class="tw" style="animation-delay:.5s"/>
    <!-- smile -->
    <rect x="628" y="110" width="6" height="4" fill="#173404"/>
    <rect x="634" y="112" width="20" height="4" fill="#173404"/>
    <rect x="654" y="110" width="6" height="4" fill="#173404"/>
    <!-- server lights -->
    <rect x="614" y="128" width="12" height="8" fill="#7ac943"/>
    <rect x="630" y="128" width="12" height="8" fill="#c0dd97"/>
    <rect x="646" y="128" width="12" height="8" fill="#7ac943"/>
    <rect x="662" y="128" width="12" height="8" fill="#639922"/>
    <rect x="614" y="142" width="60" height="6" fill="#173404"/>
    <!-- little antenna -->
    <rect x="640" y="56" width="6" height="12" fill="#1f2a1a"/>
    <rect x="637" y="48" width="12" height="8" fill="#7ac943"/>
  </g>
  <text x="644" y="196" text-anchor="middle" font-size="13" fill="#5f5e5a" font-weight="bold">RBI SERVER</text>
  <text x="644" y="212" text-anchor="middle" font-size="10" fill="#888780">runs the real site</text>

  <!-- ===== TITLE + TAGLINE ===== -->
  <text x="400" y="28" text-anchor="middle" font-size="26" font-weight="bold" fill="#1f2a1a"><tspan>Inna</tspan><tspan fill="#7ac943">IT</tspan><tspan xml:space="preserve"> RBI</tspan><tspan class="caret" fill="#639922">_</tspan></text>
  <text x="400" y="48" text-anchor="middle" font-size="12" fill="#639922" letter-spacing="0.5">Run the web at arm's length</text>
</svg>
