<svg viewBox="0 0 1320 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;display=swap');
      text{ font-family:'Playfair Display', Georgia, serif; }
      .h{ fill:#f3fbee; font-weight:700; } .sub{ fill:#9fd47a; } .lbl{ fill:#e4f4d6; font-weight:600; }
      .mut{ fill:#7fa861; } .grn{ fill:#7ac943; font-weight:700; } .warn{ fill:#ecd98f; } .red{ fill:#e8836b; }
    </style>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gb" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vig" cx="50%" cy="40%" r="82%"><stop offset="0%" stop-color="#0a140a"/><stop offset="100%" stop-color="#000"/></radialGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#2f5a1c"/><stop offset="100%" stop-color="#7ac943"/></linearGradient>
    <linearGradient id="barR" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#5a2c1c"/><stop offset="100%" stop-color="#e8836b"/></linearGradient>
  </defs>
  <rect width="1320" height="900" fill="url(#vig)"/>
  <g opacity="0.07" stroke="#7ac943" stroke-width="2">
    <line x1="300" y1="0" x2="300" y2="900" stroke-dasharray="3 28"><animate attributeName="stroke-dashoffset" from="0" to="310" dur="7s" repeatCount="indefinite"/></line>
    <line x1="760" y1="0" x2="760" y2="900" stroke-dasharray="3 30"><animate attributeName="stroke-dashoffset" from="0" to="330" dur="6.4s" repeatCount="indefinite"/></line>
    <line x1="1080" y1="0" x2="1080" y2="900" stroke-dasharray="3 24"><animate attributeName="stroke-dashoffset" from="0" to="270" dur="5.6s" repeatCount="indefinite"/></line>
  </g>

  <g transform="translate(54,52)" filter="url(#gb)">
    <path d="M0,-22 L19,-13 L19,7 C19,22 0,34 0,34 C0,34 -19,22 -19,7 L-19,-13 Z" fill="#06140a" stroke="#7ac943" stroke-width="2.2"/>
    <path d="M-8,2 C-8,-5 8,-5 8,2" fill="none" stroke="#7ac943" stroke-width="1.6"/><path d="M-5,5 C-5,0 5,0 5,5" fill="none" stroke="#7ac943" stroke-width="1.6"/>
  </g>
  <text x="86" y="48" class="h" font-size="29">InnaIT RBI — Resource Use by Load</text>
  <text x="88" y="74" class="sub" font-size="15">What one private viewer costs, and why CPU — not memory — sets the ceiling.</text>

  <g filter="url(#g)"><rect x="60" y="110" width="380" height="155" rx="16" fill="#0c130a" stroke="#7ac943" stroke-width="2"/></g>
  <text x="84" y="143" class="sub" font-size="15">Cost of ONE private viewer (streaming)</text>
  <text x="84" y="181" class="lbl" font-size="14">RAM</text><text x="250" y="181" class="grn" font-size="14">&#8776; 0.4 &#8211; 0.6 GB</text>
  <text x="84" y="215" class="lbl" font-size="14">CPU</text><text x="250" y="215" class="grn" font-size="14">&#8776; 0.7 &#8211; 1.2 cores</text>
  <text x="84" y="248" class="mut" font-size="12">browser + virtual screen + live VP8 encode</text>

  <g filter="url(#g)"><rect x="460" y="110" width="380" height="155" rx="16" fill="#11180c" stroke="#caa53a" stroke-width="1.6"/></g>
  <text x="484" y="143" class="warn" font-size="15">The bottleneck = CPU</text>
  <text x="484" y="178" class="mut" font-size="12.5">Memory is cheap to add; encoding video in</text>
  <text x="484" y="198" class="mut" font-size="12.5">real time is not. Each stream keeps a core</text>
  <text x="484" y="218" class="mut" font-size="12.5">busy, so cores run out long before RAM does.</text>
  <text x="484" y="250" class="grn" font-size="12.5">RAM holds sessions &#183; CPU lets them stream.</text>

  <g filter="url(#g)"><rect x="860" y="110" width="400" height="155" rx="16" fill="#0c130a" stroke="#7ac943" stroke-width="2"/></g>
  <text x="884" y="143" class="sub" font-size="15">This pilot box</text>
  <text x="884" y="180" class="lbl" font-size="14">4 cores &#183; 11 GB RAM</text>
  <text x="884" y="213" class="mut" font-size="12.5">cap by cores = 3 &#183; cap by RAM = 18</text>
  <text x="884" y="242" class="grn" font-size="15">Safe cap = 3 concurrent (full quality)</text>

  <text x="120" y="330" class="lbl" font-size="16">Estimated demand at scale (private-per-person)</text>

  <line x1="120" y1="700" x2="1240" y2="700" stroke="#244016" stroke-width="1.5"/>
  <text x="104" y="704" class="mut" font-size="11" text-anchor="end">0</text>

  <g>
    <rect x="210" y="610" width="64" height="90" rx="6" fill="url(#bar)" filter="url(#g)"><animate attributeName="height" from="0" to="90" dur="1.1s" fill="freeze"/><animate attributeName="y" from="700" to="610" dur="1.1s" fill="freeze"/></rect>
    <rect x="290" y="580" width="64" height="120" rx="6" fill="url(#barR)" filter="url(#g)"><animate attributeName="height" from="0" to="120" dur="1.1s" fill="freeze"/><animate attributeName="y" from="700" to="580" dur="1.1s" fill="freeze"/></rect>
    <text x="242" y="600" class="grn" font-size="12" text-anchor="middle">~6 GB</text>
    <text x="322" y="570" class="red" font-size="12" text-anchor="middle">~10 cores</text>
    <text x="282" y="728" class="lbl" font-size="14" text-anchor="middle">10 users</text>
    <text x="282" y="748" class="mut" font-size="11" text-anchor="middle">a strong single box</text>
  </g>

  <g>
    <rect x="570" y="500" width="64" height="200" rx="6" fill="url(#bar)" filter="url(#g)"><animate attributeName="height" from="0" to="200" dur="1.3s" fill="freeze"/><animate attributeName="y" from="700" to="500" dur="1.3s" fill="freeze"/></rect>
    <rect x="650" y="430" width="64" height="270" rx="6" fill="url(#barR)" filter="url(#g)"><animate attributeName="height" from="0" to="270" dur="1.3s" fill="freeze"/><animate attributeName="y" from="700" to="430" dur="1.3s" fill="freeze"/></rect>
    <text x="602" y="490" class="grn" font-size="12" text-anchor="middle">~28 GB</text>
    <text x="682" y="420" class="red" font-size="12" text-anchor="middle">~50 cores</text>
    <text x="642" y="728" class="lbl" font-size="14" text-anchor="middle">50 users</text>
    <text x="642" y="748" class="warn" font-size="11" text-anchor="middle">needs several servers</text>
  </g>

  <g>
    <rect x="930" y="430" width="64" height="270" rx="6" fill="url(#bar)" filter="url(#g)"><animate attributeName="height" from="0" to="270" dur="1.5s" fill="freeze"/><animate attributeName="y" from="700" to="430" dur="1.5s" fill="freeze"/></rect>
    <rect x="1010" y="370" width="64" height="330" rx="6" fill="url(#barR)" filter="url(#g)"><animate attributeName="height" from="0" to="330" dur="1.5s" fill="freeze"/><animate attributeName="y" from="700" to="370" dur="1.5s" fill="freeze"/></rect>
    <text x="962" y="420" class="grn" font-size="12" text-anchor="middle">~55 GB</text>
    <text x="1042" y="360" class="red" font-size="12" text-anchor="middle">~95 cores</text>
    <text x="1002" y="728" class="lbl" font-size="14" text-anchor="middle">100 users</text>
    <text x="1002" y="748" class="warn" font-size="11" text-anchor="middle">a server cluster</text>
  </g>

  <g transform="translate(1130,430)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="url(#bar)"/><text x="26" y="14" class="mut" font-size="12">RAM needed</text>
    <rect x="0" y="30" width="18" height="18" rx="4" fill="url(#barR)"/><text x="26" y="44" class="mut" font-size="12">CPU cores busy</text>
    <text x="0" y="86" class="mut" font-size="11">CPU bar outruns RAM</text>
    <text x="0" y="103" class="mut" font-size="11">at every step &#8212; proof</text>
    <text x="0" y="120" class="mut" font-size="11">the limit is compute.</text>
  </g>

  <g filter="url(#g)"><rect x="60" y="784" width="600" height="92" rx="14" fill="#13100a" stroke="#6b5a18" stroke-width="1.4"/></g>
  <text x="82" y="814" class="warn" font-size="14">When the threshold is hit</text>
  <text x="82" y="840" class="mut" font-size="12">Live CPU/RAM gate (&lt;85%) + a hard cap. The next user gets a clean</text>
  <text x="82" y="860" class="mut" font-size="12">"Server at capacity" screen &#8212; the people already on stay smooth.</text>
  <circle cx="640" cy="816" r="7" fill="#e8836b" filter="url(#g)"><animate attributeName="opacity" values="1;.3;1" dur="1.2s" repeatCount="indefinite"/></circle>

  <g filter="url(#g)"><rect x="680" y="784" width="580" height="92" rx="14" fill="#0c130a" stroke="#7ac943" stroke-width="1.6"/></g>
  <text x="702" y="814" class="grn" font-size="14">How to reach 15&#8211;50</text>
  <text x="702" y="840" class="mut" font-size="12">One box &#8776; 3 here (&#8776;12&#8211;15 on a 16-core box). For 50, run several</text>
  <text x="702" y="860" class="mut" font-size="12">servers behind a load balancer &#8212; each its own cap; panel aggregates all.</text>
</svg>
