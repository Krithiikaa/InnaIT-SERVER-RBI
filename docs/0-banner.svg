<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 210" width="680" height="210" role="img" aria-label="InnaIT RBI — Run the web at arm's length">
<title>InnaIT RBI — Run the web at arm's length</title>
<desc>Brand banner: a server-side site is shielded and streamed as safe pixels to a viewer window.</desc>
<defs>
<linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f4faee"/><stop offset="100%" stop-color="#e3f2d2"/></linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8ede4f"/><stop offset="100%" stop-color="#5aa021"/></linearGradient>
<linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7ac943"/><stop offset="100%" stop-color="#4e8f1c"/></linearGradient>
<style>
@keyframes flow { 0%{transform:translateX(0);opacity:0} 12%{opacity:1} 88%{opacity:1} 100%{transform:translateX(96px);opacity:0} }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes shield { 0%,100%{opacity:.9} 50%{opacity:.5} }
@keyframes cursor { 0%,49%{opacity:1} 50%,100%{opacity:0} }
@keyframes led { 0%,100%{opacity:1} 50%{opacity:.35} }
.pxf{animation:flow 2.6s linear infinite}
.view{animation:bob 3.4s ease-in-out infinite}
.sh{animation:shield 2.8s ease-in-out infinite}
.cur{animation:cursor 1.1s step-end infinite}
.led{animation:led 1.8s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.pxf,.view,.sh,.cur,.led{animation:none}}
</style>
</defs>
<rect x="6" y="6" width="668" height="198" rx="18" fill="url(#panel)" stroke="#c0dd97" stroke-width="1.5"/>
<rect x="6" y="6" width="10" height="198" rx="5" fill="url(#accent)"/>
<text x="44" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#1f2a1a" letter-spacing="0.5">Inna<tspan fill="#5aa021">IT</tspan> <tspan fill="#1f2a1a">RBI</tspan></text>
<rect x="46" y="72" width="150" height="4" rx="2" fill="url(#accent)"/>
<text x="46" y="98" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="15" fill="#3b6d11" letter-spacing="0.3">Run the web at arm's length</text>
<text x="46" y="126" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="12.5" fill="#5f5e5a">Whitelisted sites run server-side — you receive</text>
<text x="46" y="144" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="12.5" fill="#5f5e5a">only safe pixels, never the real code.</text>
<g font-family="'Trebuchet MS', Verdana, sans-serif">
<rect x="46" y="160" width="128" height="26" rx="13" fill="#1f2a1a"/>
<text x="110" y="177" text-anchor="middle" font-size="11.5" fill="#c0dd97" font-weight="bold">PIXELS ONLY</text>
<rect x="182" y="160" width="150" height="26" rx="13" fill="#eaf3de" stroke="#7ac943" stroke-width="1"/>
<text x="257" y="177" text-anchor="middle" font-size="11.5" fill="#3b6d11" font-weight="bold">SERVER-SIDE POLICY</text>
</g>
<g>
<rect x="586" y="40" width="60" height="120" rx="10" fill="#1f2a1a"/>
<rect x="594" y="50" width="44" height="30" rx="4" fill="url(#screen)"/>
<circle cx="606" cy="63" r="3.5" fill="#eaf3de"/>
<circle cx="626" cy="63" r="3.5" fill="#eaf3de"/>
<rect x="606" y="70" width="20" height="3" rx="1.5" fill="#eaf3de"/>
<rect x="596" y="92" width="10" height="8" rx="2" fill="#8ede4f" class="led"/>
<rect x="610" y="92" width="10" height="8" rx="2" fill="#c0dd97" class="led" style="animation-delay:.4s"/>
<rect x="624" y="92" width="10" height="8" rx="2" fill="#8ede4f" class="led" style="animation-delay:.8s"/>
<rect x="596" y="106" width="38" height="4" rx="2" fill="#3b6d11"/>
<rect x="596" y="116" width="38" height="4" rx="2" fill="#3b6d11"/>
<rect x="596" y="126" width="26" height="4" rx="2" fill="#3b6d11"/>
</g>
<text x="616" y="176" text-anchor="middle" font-family="'Trebuchet MS',Verdana,sans-serif" font-size="10.5" fill="#5f5e5a" font-weight="bold">REAL SITE</text>
<g class="sh">
<path d="M545 58 L565 50 L585 58 L585 92 Q585 112 565 122 Q545 112 545 92 Z" fill="none" stroke="#5aa021" stroke-width="2.5"/>
<path d="M556 86 l7 7 l12 -15" fill="none" stroke="#5aa021" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<g>
<rect class="pxf" x="452" y="72" width="9" height="9" rx="2" fill="#7ac943"/>
<rect class="pxf" x="452" y="72" width="9" height="9" rx="2" fill="#8ede4f" style="animation-delay:.65s"/>
<rect class="pxf" x="452" y="72" width="9" height="9" rx="2" fill="#5aa021" style="animation-delay:1.3s"/>
<rect class="pxf" x="452" y="92" width="7" height="7" rx="2" fill="#c0dd97" style="animation-delay:.32s"/>
<rect class="pxf" x="452" y="92" width="7" height="7" rx="2" fill="#7ac943" style="animation-delay:.98s"/>
<rect class="pxf" x="452" y="108" width="8" height="8" rx="2" fill="#8ede4f" style="animation-delay:1.6s"/>
</g>
<g class="view">
<rect x="360" y="52" width="80" height="72" rx="8" fill="#ffffff" stroke="#1f2a1a" stroke-width="2"/>
<rect x="360" y="52" width="80" height="16" rx="8" fill="#1f2a1a"/>
<rect x="360" y="60" width="80" height="8" fill="#1f2a1a"/>
<circle cx="370" cy="60" r="2.5" fill="#8ede4f"/>
<circle cx="379" cy="60" r="2.5" fill="#c0dd97"/>
<rect x="366" y="74" width="30" height="30" rx="3" fill="#7ac943"/>
<rect x="400" y="74" width="34" height="8" rx="2" fill="#c0dd97"/>
<rect x="400" y="86" width="34" height="8" rx="2" fill="#eaf3de"/>
<rect x="400" y="98" width="24" height="6" rx="2" fill="#c0dd97"/>
<rect x="366" y="108" width="68" height="10" rx="3" fill="#eaf3de"/>
<rect class="cur" x="428" y="110" width="2" height="6" fill="#3b6d11"/>
</g>
<text x="400" y="140" text-anchor="middle" font-family="'Trebuchet MS',Verdana,sans-serif" font-size="10.5" fill="#5f5e5a" font-weight="bold">YOU — safe view</text>
</svg>
