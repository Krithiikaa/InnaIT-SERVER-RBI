<svg viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;display=swap');
      text{ font-family:'Playfair Display', Georgia, serif; }
      .h{ fill:#f3fbee; font-weight:700; } .sub{ fill:#9fd47a; } .lbl{ fill:#e4f4d6; font-weight:600; }
      .mut{ fill:#7fa861; } .grn{ fill:#7ac943; font-weight:700; } .warn{ fill:#ecd98f; }
    </style>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gb" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vig" cx="50%" cy="38%" r="80%"><stop offset="0%" stop-color="#0a140a"/><stop offset="100%" stop-color="#000"/></radialGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2f5a1c"/><stop offset="100%" stop-color="#7ac943"/></linearGradient>
    <linearGradient id="gr" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#6b5a18"/><stop offset="100%" stop-color="#ecd98f"/></linearGradient>
  </defs>
  <rect width="1280" height="760" fill="url(#vig)"/>
  <g opacity="0.08" stroke="#7ac943" stroke-width="2">
    <line x1="200" y1="0" x2="200" y2="760" stroke-dasharray="3 30"><animate attributeName="stroke-dashoffset" from="0" to="330" dur="7s" repeatCount="indefinite"/></line>
    <line x1="640" y1="0" x2="640" y2="760" stroke-dasharray="3 26"><animate attributeName="stroke-dashoffset" from="0" to="290" dur="6s" repeatCount="indefinite"/></line>
    <line x1="1040" y1="0" x2="1040" y2="760" stroke-dasharray="3 34"><animate attributeName="stroke-dashoffset" from="0" to="370" dur="8s" repeatCount="indefinite"/></line>
  </g>

  <g transform="translate(54,52)" filter="url(#gb)">
    <path d="M0,-22 L19,-13 L19,7 C19,22 0,34 0,34 C0,34 -19,22 -19,7 L-19,-13 Z" fill="#06140a" stroke="#7ac943" stroke-width="2.2"/>
    <path d="M-8,2 C-8,-5 8,-5 8,2" fill="none" stroke="#7ac943" stroke-width="1.6"/><path d="M-5,5 C-5,0 5,0 5,5" fill="none" stroke="#7ac943" stroke-width="1.6"/>
  </g>
  <text x="86" y="48" class="h" font-size="30">How Remote Browser Isolation Works</text>
  <text x="88" y="74" class="sub" font-size="15">Think of it like a video call with a website — you watch it live, but never touch it directly.</text>

  <!-- USER side -->
  <text x="235" y="150" class="lbl" font-size="17" text-anchor="middle">YOU (your computer)</text>
  <g filter="url(#g)"><rect x="120" y="170" width="230" height="180" rx="16" fill="#0c130a" stroke="#7ac943" stroke-width="2"/></g>
  <rect x="148" y="196" width="174" height="110" rx="8" fill="#04210a" stroke="#2f5a1c"/>
  <polygon points="206,222 206,280 250,251" fill="#7ac943" filter="url(#g)"/>
  <text x="235" y="332" class="mut" font-size="12.5" text-anchor="middle">A safe video window</text>

  <!-- THE GLASS WALL -->
  <line x1="500" y1="150" x2="500" y2="560" stroke="#7ac943" stroke-width="2" stroke-dasharray="7 9" opacity="0.8"/>
  <g transform="translate(500,130)" filter="url(#gb)">
    <path d="M0,-16 L13,-9 L13,5 C13,16 0,24 0,24 C0,24 -13,16 -13,5 L-13,-9 Z" fill="#06140a" stroke="#7ac943" stroke-width="2"/>
  </g>
  <text x="500" y="585" class="grn" font-size="13" text-anchor="middle">THE GLASS WALL</text>
  <text x="500" y="605" class="mut" font-size="11" text-anchor="middle">nothing dangerous</text>
  <text x="500" y="620" class="mut" font-size="11" text-anchor="middle">crosses it</text>

  <!-- SERVER side -->
  <text x="900" y="150" class="lbl" font-size="17" text-anchor="middle">THE RBI SERVER (far away, trusted)</text>
  <g filter="url(#g)"><rect x="640" y="170" width="540" height="300" rx="16" fill="#070f07" stroke="#244016" stroke-width="1.5"/></g>

  <!-- inside: real site -> browser -> camera -->
  <g filter="url(#g)"><rect x="980" y="200" width="170" height="92" rx="12" fill="#11180c" stroke="#caa53a" stroke-width="1.6"/></g>
  <text x="1065" y="240" font-size="13.5" text-anchor="middle" fill="#ecd98f" font-weight="700">Real website</text>
  <text x="1065" y="262" font-size="11" text-anchor="middle" fill="#b9a35a">code · logins · data</text>

  <g filter="url(#g)"><rect x="800" y="200" width="150" height="92" rx="12" fill="#0c130a" stroke="#7ac943" stroke-width="2"/></g>
  <text x="875" y="238" class="lbl" font-size="13.5" text-anchor="middle">Robot browser</text>
  <text x="875" y="260" class="mut" font-size="11" text-anchor="middle">opens it for you</text>

  <g filter="url(#g)"><rect x="660" y="200" width="120" height="92" rx="12" fill="#0c130a" stroke="#7ac943" stroke-width="2"/></g>
  <text x="720" y="238" class="lbl" font-size="13" text-anchor="middle">Camera</text>
  <text x="720" y="260" class="mut" font-size="11" text-anchor="middle">films screen</text>

  <!-- inside arrows (right to left) -->
  <g stroke="#3f7227" stroke-width="2" fill="none" opacity=".6"><line x1="980" y1="246" x2="950" y2="246"/><line x1="800" y1="246" x2="780" y2="246"/></g>
  <g fill="#7ac943" filter="url(#g)">
    <circle r="3.4"><animateMotion dur="1.5s" repeatCount="indefinite" path="M980,246 L950,246"/></circle>
    <circle r="3.4"><animateMotion dur="1.3s" repeatCount="indefinite" path="M800,246 L780,246"/></circle>
  </g>
  <text x="910" y="350" class="mut" font-size="12" text-anchor="middle">1. The robot browser loads the real site and renders it.</text>
  <text x="910" y="372" class="mut" font-size="12" text-anchor="middle">2. A "camera" films that screen 30 times a second.</text>
  <text x="910" y="394" class="mut" font-size="12" text-anchor="middle">3. The film is sent to you as a live video — just pixels.</text>
  <text x="910" y="416" class="mut" font-size="12" text-anchor="middle">4. Your clicks &amp; typing travel back and drive the robot.</text>

  <!-- BIG video-out arc (server -> user) -->
  <path d="M660,300 C480,330 420,300 352,260" fill="none" stroke="url(#gl)" stroke-width="4" stroke-dasharray="10 13" filter="url(#g)"><animate attributeName="stroke-dashoffset" from="46" to="0" dur=".9s" repeatCount="indefinite"/></path>
  <g fill="#aef07a" filter="url(#gb)">
    <circle r="5"><animateMotion dur="1.5s" repeatCount="indefinite" path="M660,300 C480,330 420,300 352,260"/></circle>
    <circle r="5"><animateMotion dur="1.5s" begin=".5s" repeatCount="indefinite" path="M660,300 C480,330 420,300 352,260"/></circle>
    <circle r="5"><animateMotion dur="1.5s" begin="1s" repeatCount="indefinite" path="M660,300 C480,330 420,300 352,260"/></circle>
  </g>
  <text x="470" y="240" class="grn" font-size="14" text-anchor="middle">LIVE VIDEO →</text>
  <text x="470" y="260" class="mut" font-size="11" text-anchor="middle">pixels only, safe</text>

  <!-- input arc (user -> server) -->
  <path d="M352,330 C440,380 540,400 660,400" fill="none" stroke="url(#gr)" stroke-width="2.6" stroke-dasharray="8 11" opacity=".9"><animate attributeName="stroke-dashoffset" from="0" to="38" dur="1.1s" repeatCount="indefinite"/></path>
  <g fill="#ecd98f" filter="url(#g)">
    <circle r="4"><animateMotion dur="1.8s" repeatCount="indefinite" path="M352,330 C440,380 540,400 660,400"/></circle>
    <circle r="4"><animateMotion dur="1.8s" begin=".9s" repeatCount="indefinite" path="M352,330 C440,380 540,400 660,400"/></circle>
  </g>
  <text x="500" y="430" class="warn" font-size="13" text-anchor="middle">← your clicks &amp; keys</text>

  <!-- why it is safe -->
  <g filter="url(#g)"><rect x="120" y="470" width="340" height="120" rx="14" fill="#0c130a" stroke="#7ac943" stroke-width="1.6"/></g>
  <text x="142" y="502" class="grn" font-size="14">Why it's safe</text>
  <text x="142" y="528" class="mut" font-size="12">The website's real code never reaches you —</text>
  <text x="142" y="548" class="mut" font-size="12">so a malicious page can't run on your machine.</text>
  <text x="142" y="568" class="mut" font-size="12">You only ever receive harmless video.</text>

  <!-- honest caveat -->
  <g filter="url(#g)"><rect x="640" y="500" width="540" height="118" rx="14" fill="#13100a" stroke="#6b5a18" stroke-width="1.4"/></g>
  <text x="662" y="532" class="warn" font-size="14">One honest note</text>
  <text x="662" y="558" class="mut" font-size="12">Pixel-streaming hides the front-end, but the text you TYPE still reaches</text>
  <text x="662" y="578" class="mut" font-size="12">the real backend. So a firewall + safe database queries are still needed —</text>
  <text x="662" y="598" class="mut" font-size="12">RBI is one strong layer, not the whole wall.</text>

  <text x="640" y="712" class="mut" font-size="12.5" text-anchor="middle">Zero Trust, Verify Everything — the site runs over there; you just watch a secured window of it.</text>
</svg>
