<svg viewBox="0 0 1340 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;display=swap');
      text{ font-family:'Playfair Display', Georgia, serif; }
      .mono{ font-family:'DejaVu Sans Mono','Courier New',monospace; }
      .h{ fill:#f3fbee; font-weight:700; } .sub{ fill:#9fd47a; } .lbl{ fill:#e4f4d6; font-weight:600; }
      .mut{ fill:#7fa861; } .grn{ fill:#7ac943; font-weight:700; } .warn{ fill:#ecd98f; } .red{ fill:#e8836b; }
    </style>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gb" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vig" cx="50%" cy="38%" r="85%"><stop offset="0%" stop-color="#0a140a"/><stop offset="100%" stop-color="#000"/></radialGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#2f5a1c"/><stop offset="100%" stop-color="#7ac943"/></linearGradient>
    <linearGradient id="barR" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#5a2c1c"/><stop offset="100%" stop-color="#e8836b"/></linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2f5a1c"/><stop offset="100%" stop-color="#7ac943"/></linearGradient>
  </defs>
  <rect width="1340" height="1000" fill="url(#vig)"/>
  <g opacity="0.06" stroke="#7ac943" stroke-width="2">
    <line x1="320" y1="0" x2="320" y2="1000" stroke-dasharray="3 28"><animate attributeName="stroke-dashoffset" from="0" to="310" dur="7s" repeatCount="indefinite"/></line>
    <line x1="780" y1="0" x2="780" y2="1000" stroke-dasharray="3 30"><animate attributeName="stroke-dashoffset" from="0" to="330" dur="6.4s" repeatCount="indefinite"/></line>
    <line x1="1100" y1="0" x2="1100" y2="1000" stroke-dasharray="3 24"><animate attributeName="stroke-dashoffset" from="0" to="270" dur="5.6s" repeatCount="indefinite"/></line>
  </g>

  <g transform="translate(54,52)" filter="url(#gb)">
    <path d="M0,-22 L19,-13 L19,7 C19,22 0,34 0,34 C0,34 -19,22 -19,7 L-19,-13 Z" fill="#06140a" stroke="#7ac943" stroke-width="2.2"/>
    <path d="M-8,2 C-8,-5 8,-5 8,2" fill="none" stroke="#7ac943" stroke-width="1.6"/><path d="M-5,5 C-5,0 5,0 5,5" fill="none" stroke="#7ac943" stroke-width="1.6"/>
  </g>
  <text x="86" y="46" class="h" font-size="28">InnaIT RBI — Resource Model &amp; Per-Session Stack</text>
  <text x="88" y="72" class="sub" font-size="14.5">The tools each session runs, the data path, and why CPU (real-time VP8 encode) is the hard ceiling.</text>

  <!-- ================= PER-SESSION TOOLCHAIN (the pipeline) ================= -->
  <g filter="url(#g)"><rect x="56" y="98" width="1228" height="196" rx="16" fill="#070f07" stroke="#244016" stroke-width="1.5"/></g>
  <text x="78" y="126" class="sub" font-size="15">One private session — the toolchain &amp; where the cost lands</text>

  <!-- stage boxes -->
  <!-- Xvfb -->
  <g filter="url(#g)"><rect x="78" y="146" width="150" height="92" rx="11" fill="#0c130a" stroke="#7ac943" stroke-width="1.8"/></g>
  <text x="153" y="172" class="lbl" font-size="13" text-anchor="middle">Xvfb</text>
  <text x="153" y="192" class="mut" font-size="10.5" text-anchor="middle">virtual X display</text>
  <text x="153" y="207" class="mut" font-size="10.5" text-anchor="middle">:101 @ WxH</text>
  <text x="153" y="228" class="grn mono" font-size="10" text-anchor="middle">~80 MB</text>

  <!-- Chrome -->
  <g filter="url(#g)"><rect x="252" y="146" width="160" height="92" rx="11" fill="#0c130a" stroke="#7ac943" stroke-width="1.8"/></g>
  <text x="332" y="172" class="lbl" font-size="13" text-anchor="middle">Google Chrome</text>
  <text x="332" y="192" class="mut" font-size="10.5" text-anchor="middle">--kiosk, own profile</text>
  <text x="332" y="207" class="mut" font-size="10.5" text-anchor="middle">renders real site</text>
  <text x="332" y="228" class="grn mono" font-size="10" text-anchor="middle">~300-450 MB</text>

  <!-- ximagesrc -->
  <g filter="url(#g)"><rect x="436" y="146" width="150" height="92" rx="11" fill="#0c130a" stroke="#7ac943" stroke-width="1.8"/></g>
  <text x="511" y="172" class="lbl" font-size="12.5" text-anchor="middle">GStreamer</text>
  <text x="511" y="190" class="mut" font-size="10.5" text-anchor="middle">ximagesrc</text>
  <text x="511" y="205" class="mut" font-size="10.5" text-anchor="middle">grab @ 30 fps</text>
  <text x="511" y="228" class="grn mono" font-size="10" text-anchor="middle">light CPU</text>

  <!-- vp8enc -->
  <g filter="url(#g)"><rect x="610" y="142" width="170" height="100" rx="11" fill="#11180c" stroke="#caa53a" stroke-width="2"/></g>
  <text x="695" y="168" class="warn" font-size="13" text-anchor="middle">vp8enc (encode)</text>
  <text x="695" y="187" class="mut" font-size="10.5" text-anchor="middle">deadline=1 cpu-used=5</text>
  <text x="695" y="202" class="mut" font-size="10.5" text-anchor="middle">CBR, keyframe=30</text>
  <text x="695" y="228" class="red mono" font-size="10.5" text-anchor="middle">~0.7-1.2 CORES</text>

  <!-- rtp/webrtcbin -->
  <g filter="url(#g)"><rect x="804" y="146" width="160" height="92" rx="11" fill="#0c130a" stroke="#7ac943" stroke-width="1.8"/></g>
  <text x="884" y="172" class="lbl" font-size="12.5" text-anchor="middle">rtpvp8pay →</text>
  <text x="884" y="190" class="lbl" font-size="12.5" text-anchor="middle">webrtcbin</text>
  <text x="884" y="207" class="mut" font-size="10.5" text-anchor="middle">SRTP / ICE / DTLS</text>
  <text x="884" y="228" class="grn mono" font-size="10" text-anchor="middle">net I/O</text>

  <!-- client -->
  <g filter="url(#g)"><rect x="988" y="146" width="160" height="92" rx="11" fill="#0c130a" stroke="#7ac943" stroke-width="2"/></g>
  <text x="1068" y="172" class="lbl" font-size="12.5" text-anchor="middle">Browser &lt;video&gt;</text>
  <text x="1068" y="190" class="mut" font-size="10.5" text-anchor="middle">WebRTC peer</text>
  <text x="1068" y="207" class="mut" font-size="10.5" text-anchor="middle">decodes pixels</text>
  <text x="1068" y="228" class="grn mono" font-size="10" text-anchor="middle">client-side</text>

  <!-- input return -->
  <g filter="url(#g)"><rect x="1172" y="146" width="92" height="92" rx="11" fill="#0c130a" stroke="#7ac943" stroke-width="1.8"/></g>
  <text x="1218" y="180" class="lbl" font-size="12" text-anchor="middle">xdotool</text>
  <text x="1218" y="200" class="mut" font-size="10" text-anchor="middle">inject</text>
  <text x="1218" y="214" class="mut" font-size="10" text-anchor="middle">click/key</text>

  <!-- forward flow arrows -->
  <g stroke="url(#gl)" stroke-width="2.6" fill="none" filter="url(#g)" stroke-dasharray="7 8">
    <line x1="228" y1="192" x2="252" y2="192"><animate attributeName="stroke-dashoffset" from="30" to="0" dur=".8s" repeatCount="indefinite"/></line>
    <line x1="412" y1="192" x2="436" y2="192"><animate attributeName="stroke-dashoffset" from="30" to="0" dur=".8s" repeatCount="indefinite"/></line>
    <line x1="586" y1="192" x2="610" y2="192"><animate attributeName="stroke-dashoffset" from="30" to="0" dur=".8s" repeatCount="indefinite"/></line>
    <line x1="780" y1="192" x2="804" y2="192"><animate attributeName="stroke-dashoffset" from="30" to="0" dur=".8s" repeatCount="indefinite"/></line>
    <line x1="964" y1="192" x2="988" y2="192"><animate attributeName="stroke-dashoffset" from="30" to="0" dur=".8s" repeatCount="indefinite"/></line>
  </g>
  <g fill="#aef07a" filter="url(#gb)">
    <circle r="3.6"><animateMotion dur="3s" repeatCount="indefinite" path="M153,238 L153,260 L1068,260 L1068,238"/></circle>
    <circle r="3.6"><animateMotion dur="3s" begin="1.5s" repeatCount="indefinite" path="M153,238 L153,260 L1068,260 L1068,238"/></circle>
  </g>
  <!-- input return arrow (client -> xdotool -> chrome) -->
  <path d="M1068,238 C1068,275 1218,275 1218,238" fill="none" stroke="#caa53a" stroke-width="2" stroke-dasharray="6 8" opacity=".85"><animate attributeName="stroke-dashoffset" from="0" to="28" dur="1s" repeatCount="indefinite"/></path>
  <text x="1143" y="285" class="warn mono" font-size="9.5" text-anchor="middle">input return path</text>

  <!-- ================= TOP RIGHT: per-user + this box ================= -->
  <g filter="url(#g)"><rect x="56" y="312" width="396" height="150" rx="16" fill="#0c130a" stroke="#7ac943" stroke-width="2"/></g>
  <text x="78" y="342" class="sub" font-size="14.5">Per active session (steady-state)</text>
  <text x="78" y="376" class="lbl" font-size="13">RAM</text><text x="240" y="376" class="grn mono" font-size="13">0.4 – 0.6 GB</text>
  <text x="78" y="406" class="lbl" font-size="13">CPU</text><text x="240" y="406" class="red mono" font-size="13">0.7 – 1.2 cores</text>
  <text x="78" y="436" class="mut" font-size="11.5">idle tab drops CPU to ~0.1–0.3 core (little to encode)</text>

  <g filter="url(#g)"><rect x="468" y="312" width="396" height="150" rx="16" fill="#11180c" stroke="#caa53a" stroke-width="1.6"/></g>
  <text x="490" y="342" class="warn" font-size="14.5">Bottleneck = real-time encode</text>
  <text x="490" y="374" class="mut" font-size="11.5">RAM is additive &amp; cheap; software VP8 at 30 fps</text>
  <text x="490" y="392" class="mut" font-size="11.5">pins a core per stream. Cores exhaust first —</text>
  <text x="490" y="410" class="mut" font-size="11.5">hence a CPU-based cap, not a memory-based one.</text>
  <text x="490" y="440" class="grn" font-size="11.5">Hardware encode (VAAPI/NVENC) would raise this.</text>

  <g filter="url(#g)"><rect x="880" y="312" width="404" height="150" rx="16" fill="#0c130a" stroke="#7ac943" stroke-width="2"/></g>
  <text x="902" y="342" class="sub" font-size="14.5">This pilot host (elkdevsrv01)</text>
  <text x="902" y="376" class="lbl mono" font-size="13">nproc = 4 &#183; RAM = 11 GiB</text>
  <text x="902" y="404" class="mut mono" font-size="11.5">CAP_cores = N-1 = 3 &#183; CAP_ram = (11-2)/0.5 = 18</text>
  <text x="902" y="432" class="grn mono" font-size="13.5">MAX_SESSIONS = min(3,18) = 3</text>

  <!-- ================= CHART ================= -->
  <text x="120" y="512" class="lbl" font-size="16">Projected demand, private-per-person (software VP8, ~720–900p @ 30 fps)</text>

  <line x1="120" y1="838" x2="1260" y2="838" stroke="#244016" stroke-width="1.5"/>
  <text x="104" y="842" class="mut mono" font-size="11" text-anchor="end">0</text>

  <!-- 10 users -->
  <g>
    <rect x="230" y="748" width="62" height="90" rx="6" fill="url(#bar)" filter="url(#g)"><animate attributeName="height" from="0" to="90" dur="1.1s" fill="freeze"/><animate attributeName="y" from="838" to="748" dur="1.1s" fill="freeze"/></rect>
    <rect x="308" y="718" width="62" height="120" rx="6" fill="url(#barR)" filter="url(#g)"><animate attributeName="height" from="0" to="120" dur="1.1s" fill="freeze"/><animate attributeName="y" from="838" to="718" dur="1.1s" fill="freeze"/></rect>
    <text x="261" y="738" class="grn mono" font-size="11.5" text-anchor="middle">~6 GB</text>
    <text x="339" y="708" class="red mono" font-size="11.5" text-anchor="middle">~10 cores</text>
    <text x="300" y="866" class="lbl" font-size="14" text-anchor="middle">10 users</text>
    <text x="300" y="886" class="mut" font-size="11" text-anchor="middle">one strong 12–16 core box</text>
  </g>
  <!-- 50 users -->
  <g>
    <rect x="600" y="638" width="62" height="200" rx="6" fill="url(#bar)" filter="url(#g)"><animate attributeName="height" from="0" to="200" dur="1.3s" fill="freeze"/><animate attributeName="y" from="838" to="638" dur="1.3s" fill="freeze"/></rect>
    <rect x="678" y="568" width="62" height="270" rx="6" fill="url(#barR)" filter="url(#g)"><animate attributeName="height" from="0" to="270" dur="1.3s" fill="freeze"/><animate attributeName="y" from="838" to="568" dur="1.3s" fill="freeze"/></rect>
    <text x="631" y="628" class="grn mono" font-size="11.5" text-anchor="middle">~28 GB</text>
    <text x="709" y="558" class="red mono" font-size="11.5" text-anchor="middle">~50 cores</text>
    <text x="670" y="866" class="lbl" font-size="14" text-anchor="middle">50 users</text>
    <text x="670" y="886" class="warn" font-size="11" text-anchor="middle">cluster: ~4–5 nodes</text>
  </g>
  <!-- 100 users -->
  <g>
    <rect x="970" y="568" width="62" height="270" rx="6" fill="url(#bar)" filter="url(#g)"><animate attributeName="height" from="0" to="270" dur="1.5s" fill="freeze"/><animate attributeName="y" from="838" to="568" dur="1.5s" fill="freeze"/></rect>
    <rect x="1048" y="508" width="62" height="330" rx="6" fill="url(#barR)" filter="url(#g)"><animate attributeName="height" from="0" to="330" dur="1.5s" fill="freeze"/><animate attributeName="y" from="838" to="508" dur="1.5s" fill="freeze"/></rect>
    <text x="1001" y="558" class="grn mono" font-size="11.5" text-anchor="middle">~55 GB</text>
    <text x="1079" y="498" class="red mono" font-size="11.5" text-anchor="middle">~95 cores</text>
    <text x="1040" y="866" class="lbl" font-size="14" text-anchor="middle">100 users</text>
    <text x="1040" y="886" class="warn" font-size="11" text-anchor="middle">cluster: ~8–10 nodes</text>
  </g>

  <!-- legend -->
  <g transform="translate(1168,560)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="url(#bar)"/><text x="26" y="14" class="mut" font-size="12">RAM needed</text>
    <rect x="0" y="30" width="18" height="18" rx="4" fill="url(#barR)"/><text x="26" y="44" class="mut" font-size="12">CPU cores busy</text>
    <text x="0" y="84" class="mut" font-size="11">CPU outruns RAM at</text>
    <text x="0" y="101" class="mut" font-size="11">every tier — compute,</text>
    <text x="0" y="118" class="mut" font-size="11">not memory, is the wall.</text>
  </g>

  <!-- bottom: admission mechanism + scaling -->
  <g filter="url(#g)"><rect x="56" y="906" width="612" height="78" rx="14" fill="#13100a" stroke="#6b5a18" stroke-width="1.4"/></g>
  <text x="78" y="934" class="warn" font-size="13.5">Threshold reaction (admission control)</text>
  <text x="78" y="958" class="mut mono" font-size="11">if used &#8805; MAX_SESSIONS or psutil cpu/ram &#8805; 85%:</text>
  <text x="78" y="974" class="mut mono" font-size="11">  ws.send({type:"capacity"}) &#8594; close  // live users untouched</text>
  <circle cx="648" cy="936" r="7" fill="#e8836b" filter="url(#g)"><animate attributeName="opacity" values="1;.3;1" dur="1.2s" repeatCount="indefinite"/></circle>

  <g filter="url(#g)"><rect x="688" y="906" width="596" height="78" rx="14" fill="#0c130a" stroke="#7ac943" stroke-width="1.6"/></g>
  <text x="710" y="934" class="grn" font-size="13.5">Horizontal scaling path</text>
  <text x="710" y="958" class="mut" font-size="11.5">N identical nodes behind nginx/HAProxy; LB routes to least-loaded</text>
  <text x="710" y="974" class="mut" font-size="11.5">via each node's /load endpoint; admin aggregates all sessions.json.</text>
</svg>
