<svg viewBox="0 0 1480 1180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;display=swap');
      text { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; }
      .mono{ font-family:'Courier New', monospace; }
      .title{ fill:#16321a; font-weight:700; }
      .band{ fill:#16321a; font-weight:700; }
      .sub{ fill:#3f7d22; font-weight:400; }
      .lbl{ fill:#1f2a1a; font-weight:700; }
      .mut{ fill:#5d6f4e; font-weight:400; }
      .grn{ fill:#3f7d22; font-weight:700; }
      .amb{ fill:#9a7d12; font-weight:700; }
      .red{ fill:#b6452f; font-weight:600; }
      .route{ fill:#16321a; font-weight:700; }
    </style>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#16321a" flood-opacity="0.13"/></filter>
  </defs>

  <rect x="0" y="0" width="1480" height="1180" fill="#f5f8f2"/>
  <rect x="0" y="0" width="1480" height="6" fill="#7ac943"/>
  <g opacity="0.04" stroke="#7ac943" stroke-width="2">
    <line x1="240" y1="40" x2="240" y2="1160" stroke-dasharray="3 26"><animate attributeName="stroke-dashoffset" from="0" to="290" dur="6s" repeatCount="indefinite"/></line>
    <line x1="760" y1="40" x2="760" y2="1160" stroke-dasharray="3 30"><animate attributeName="stroke-dashoffset" from="0" to="330" dur="7s" repeatCount="indefinite"/></line>
    <line x1="1240" y1="40" x2="1240" y2="1160" stroke-dasharray="3 22"><animate attributeName="stroke-dashoffset" from="0" to="250" dur="5s" repeatCount="indefinite"/></line>
  </g>

  <!-- header -->
  <text x="60" y="60" class="title" font-size="32">InnaIT · RBI Request &amp; API Map</text>
  <text x="62" y="90" class="sub" font-size="16">Every hit, where it lands, what the server does, and where it reflects — viewer &amp; admin paths.</text>

  <!-- =================== BAND 1 : VIEWER ROUTES =================== -->
  <g filter="url(#soft)"><rect x="60" y="118" width="1360" height="186" rx="16" fill="#ffffff" stroke="#cfe0c2" stroke-width="1.6"/></g>
  <text x="84" y="148" class="band" font-size="17">1 · Viewer → Streamer  (the page the user opens, ports 8100 / 8101 …)</text>

  <!-- 4 route cards -->
  <g filter="url(#soft)"><rect x="84" y="166" width="312" height="118" rx="12" fill="#f3f8ee" stroke="#a9d488" stroke-width="1.4"/></g>
  <rect x="100" y="180" width="120" height="26" rx="7" fill="#16321a"/><text x="160" y="198" class="mono" font-size="12" fill="#bff09a" text-anchor="middle">GET /</text>
  <text x="100" y="228" class="mut" font-size="12">serves public/index.html</text>
  <text x="100" y="248" class="mut" font-size="12">— the viewer (WebRTC client,</text>
  <text x="100" y="266" class="mut" font-size="12">input capture, back-trap)</text>

  <g filter="url(#soft)"><rect x="416" y="166" width="312" height="118" rx="12" fill="#f3f8ee" stroke="#a9d488" stroke-width="1.4"/></g>
  <rect x="432" y="180" width="150" height="26" rx="7" fill="#16321a"/><text x="507" y="198" class="mono" font-size="12" fill="#bff09a" text-anchor="middle">GET /whoami</text>
  <text x="432" y="228" class="mut" font-size="12">returns the site bound to</text>
  <text x="432" y="248" class="mut" font-size="12">this port:</text>
  <text x="432" y="266" class="mono" font-size="11" fill="#3f7d22">{name, url, port}</text>

  <g filter="url(#soft)"><rect x="748" y="166" width="312" height="118" rx="12" fill="#f3f8ee" stroke="#a9d488" stroke-width="1.4"/></g>
  <rect x="764" y="180" width="130" height="26" rx="7" fill="#16321a"/><text x="829" y="198" class="mono" font-size="12" fill="#bff09a" text-anchor="middle">GET /load</text>
  <text x="764" y="228" class="mut" font-size="12">live capacity telemetry:</text>
  <text x="764" y="248" class="mono" font-size="11" fill="#3f7d22">{cpu, ram, cap,</text>
  <text x="764" y="266" class="mono" font-size="11" fill="#3f7d22"> used, browser}</text>

  <g filter="url(#soft)"><rect x="1080" y="166" width="312" height="118" rx="12" fill="#eef7e6" stroke="#7ac943" stroke-width="2"/></g>
  <rect x="1096" y="180" width="120" height="26" rx="7" fill="#3f7d22"/><text x="1156" y="198" class="mono" font-size="12" fill="#ffffff" text-anchor="middle">WS /ws</text>
  <text x="1096" y="228" class="grn" font-size="12">the live channel —</text>
  <text x="1096" y="248" class="mut" font-size="12">VP8 video out + all</text>
  <text x="1096" y="266" class="mut" font-size="12">input/SDP/ICE in</text>

  <!-- =================== BAND 2 : /ws MESSAGE TYPES =================== -->
  <g filter="url(#soft)"><rect x="60" y="324" width="1360" height="150" rx="16" fill="#ffffff" stroke="#cfe0c2" stroke-width="1.6"/></g>
  <text x="84" y="354" class="band" font-size="17">2 · Messages on the /ws channel</text>

  <text x="100" y="392" class="grn" font-size="13">Client → Server</text>
  <g class="mono" font-size="11.5" fill="#3f7d22">
    <text x="100" y="416">resize {w,h}</text>
    <text x="240" y="416">sdp:answer</text>
    <text x="372" y="416">ice</text>
    <text x="452" y="416">input: mousemove · down · up · wheel · key</text>
    <text x="100" y="442">nav: back · forward · reload   (back = alt+Left, stays in-site)</text>
  </g>

  <text x="760" y="392" class="amb" font-size="13">Server → Client</text>
  <g class="mono" font-size="11.5" fill="#9a7d12">
    <text x="760" y="416">config {w,h,policies}</text>
    <text x="980" y="416">sdp:offer</text>
    <text x="1120" y="416">ice</text>
    <text x="760" y="442">capacity {used,cap}   ·   disabled   (graceful refusals)</text>
  </g>

  <!-- =================== BAND 3 : SERVER-SIDE OPS =================== -->
  <g filter="url(#soft)"><rect x="60" y="494" width="1360" height="206" rx="16" fill="#ffffff" stroke="#cfe0c2" stroke-width="1.6"/></g>
  <text x="84" y="524" class="band" font-size="17">3 · What one /ws connection triggers on the server (in order)</text>

  <!-- 6 op nodes -->
  <g filter="url(#soft)"><rect x="86" y="544" width="196" height="106" rx="12" fill="#f3f8ee" stroke="#7ac943" stroke-width="1.6"/></g>
  <circle cx="108" cy="544" r="13" fill="#7ac943"/><text x="108" y="549" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="184" y="576" class="lbl" font-size="13" text-anchor="middle">Admission</text>
  <text x="184" y="598" class="mut" font-size="10.5" text-anchor="middle">cap=3 &amp; psutil</text>
  <text x="184" y="614" class="mut" font-size="10.5" text-anchor="middle">cpu/ram &lt; 85%</text>
  <text x="184" y="636" class="mono" font-size="9.5" fill="#9a7d12" text-anchor="middle">else → capacity</text>

  <g filter="url(#soft)"><rect x="306" y="544" width="196" height="106" rx="12" fill="#f3f8ee" stroke="#7ac943" stroke-width="1.6"/></g>
  <circle cx="328" cy="544" r="13" fill="#7ac943"/><text x="328" y="549" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="404" y="576" class="lbl" font-size="13" text-anchor="middle">Alloc display</text>
  <text x="404" y="598" class="mut" font-size="10.5" text-anchor="middle">take :10N from</text>
  <text x="404" y="614" class="mut" font-size="10.5" text-anchor="middle">the pool</text>
  <text x="404" y="636" class="mono" font-size="9.5" fill="#3f7d22" text-anchor="middle">free on exit</text>

  <g filter="url(#soft)"><rect x="526" y="544" width="196" height="106" rx="12" fill="#f3f8ee" stroke="#7ac943" stroke-width="1.6"/></g>
  <circle cx="548" cy="544" r="13" fill="#7ac943"/><text x="548" y="549" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="624" y="576" class="lbl" font-size="13" text-anchor="middle">Spawn env</text>
  <text x="624" y="598" class="mut" font-size="10.5" text-anchor="middle">Xvfb + Chrome</text>
  <text x="624" y="614" class="mut" font-size="10.5" text-anchor="middle">own profile</text>
  <text x="624" y="636" class="mono" font-size="9.5" fill="#3f7d22" text-anchor="middle">spawn_private()</text>

  <g filter="url(#soft)"><rect x="746" y="544" width="196" height="106" rx="12" fill="#eef7e6" stroke="#7ac943" stroke-width="2"/></g>
  <circle cx="768" cy="544" r="13" fill="#7ac943"/><text x="768" y="549" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="844" y="576" class="lbl" font-size="13" text-anchor="middle">GStreamer</text>
  <text x="844" y="598" class="mut" font-size="10.5" text-anchor="middle">ximagesrc → vp8enc</text>
  <text x="844" y="614" class="mut" font-size="10.5" text-anchor="middle">→ webrtcbin</text>
  <text x="844" y="636" class="mono" font-size="9.5" fill="#3f7d22" text-anchor="middle">hot path · CPU</text>

  <g filter="url(#soft)"><rect x="966" y="544" width="196" height="106" rx="12" fill="#f3f8ee" stroke="#7ac943" stroke-width="1.6"/></g>
  <circle cx="988" cy="544" r="13" fill="#7ac943"/><text x="988" y="549" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <text x="1064" y="576" class="lbl" font-size="13" text-anchor="middle">SDP / ICE</text>
  <text x="1064" y="598" class="mut" font-size="10.5" text-anchor="middle">offer → answer</text>
  <text x="1064" y="614" class="mut" font-size="10.5" text-anchor="middle">DTLS-SRTP up</text>
  <text x="1064" y="636" class="mono" font-size="9.5" fill="#3f7d22" text-anchor="middle">ICE COMPLETED</text>

  <g filter="url(#soft)"><rect x="1186" y="544" width="206" height="106" rx="12" fill="#fdf0ee" stroke="#c66a55" stroke-width="1.6"/></g>
  <circle cx="1208" cy="544" r="13" fill="#c66a55"/><text x="1208" y="549" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="1289" y="576" class="red" font-size="13" text-anchor="middle">xdotool input</text>
  <text x="1289" y="598" class="mut" font-size="10.5" text-anchor="middle">replays on :10N</text>
  <text x="1289" y="614" class="mut" font-size="10.5" text-anchor="middle">policy-gated</text>
  <text x="1289" y="636" class="mono" font-size="9.5" fill="#b6452f" text-anchor="middle">read-only drops it</text>

  <!-- arrows between op nodes -->
  <g stroke="#9ec77f" stroke-width="2" fill="none">
    <line x1="282" y1="597" x2="306" y2="597"/><line x1="502" y1="597" x2="526" y2="597"/>
    <line x1="722" y1="597" x2="746" y2="597"/><line x1="942" y1="597" x2="966" y2="597"/>
    <line x1="1162" y1="597" x2="1186" y2="597"/>
  </g>
  <g fill="#4e9a2a">
    <circle r="3.4"><animateMotion dur="2.6s" repeatCount="indefinite" path="M282,597 L306,597 M502,597 L526,597 M722,597 L746,597 M942,597 L966,597 M1162,597 L1186,597"/></circle>
  </g>
  <text x="86" y="684" class="mut" font-size="11.5">On disconnect → <tspan class="mono" fill="#3f7d22">teardown_private()</tspan> kills that Xvfb+Chrome, removes the profile, returns :10N to the pool, drops the session.</text>

  <!-- =================== BAND 4 : SHARED BRIDGE =================== -->
  <g filter="url(#soft)"><rect x="60" y="720" width="1360" height="150" rx="16" fill="#ffffff" stroke="#cfe0c2" stroke-width="1.6"/></g>
  <text x="84" y="750" class="band" font-size="17">4 · Shared bridge — admin and streamer never call each other directly; they pass JSON files</text>

  <g filter="url(#soft)"><rect x="150" y="772" width="350" height="78" rx="12" fill="#f3f8ee" stroke="#7ac943" stroke-width="1.6"/></g>
  <text x="325" y="800" class="mono" font-size="13" fill="#16321a" text-anchor="middle">config.json</text>
  <text x="325" y="822" class="mut" font-size="11" text-anchor="middle">admin WRITES → streamer READS live</text>
  <text x="325" y="840" class="mut" font-size="10.5" text-anchor="middle">sites · ports · policies · bitrate · max_sessions</text>

  <g filter="url(#soft)"><rect x="565" y="772" width="350" height="78" rx="12" fill="#f3f8ee" stroke="#7ac943" stroke-width="1.6"/></g>
  <text x="740" y="800" class="mono" font-size="13" fill="#16321a" text-anchor="middle">sessions.json</text>
  <text x="740" y="822" class="mut" font-size="11" text-anchor="middle">streamer WRITES → admin READS (every 2s)</text>
  <text x="740" y="840" class="mut" font-size="10.5" text-anchor="middle">live viewers · cpu · ram · used · cap</text>

  <g filter="url(#soft)"><rect x="980" y="772" width="350" height="78" rx="12" fill="#fffdf2" stroke="#caa53a" stroke-width="1.6"/></g>
  <text x="1155" y="800" class="mono" font-size="13" fill="#16321a" text-anchor="middle">commands.json</text>
  <text x="1155" y="822" class="mut" font-size="11" text-anchor="middle">admin WRITES → streamer READS &amp; clears</text>
  <text x="1155" y="840" class="mut" font-size="10.5" text-anchor="middle">kill / stop a session · disable</text>

  <!-- =================== BAND 5 : ADMIN ROUTES =================== -->
  <g filter="url(#soft)"><rect x="60" y="886" width="1360" height="120" rx="16" fill="#ffffff" stroke="#cfe0c2" stroke-width="1.6"/></g>
  <text x="84" y="916" class="band" font-size="17">5 · Admin → Admin server (:8200, hmac cookie auth)</text>
  <g class="mono" font-size="11.5">
    <text x="100" y="948" fill="#16321a">POST /login</text><text x="240" y="948" class="mut" fill="#5d6f4e">→ cookie</text>
    <text x="360" y="948" fill="#16321a">GET /</text><text x="430" y="948" class="mut" fill="#5d6f4e">→ white panel</text>
    <text x="600" y="948" fill="#16321a">GET /api/state</text><text x="770" y="948" class="mut" fill="#5d6f4e">→ sessions + config</text>
    <text x="1000" y="948" fill="#16321a">POST /api/settings</text><text x="1210" y="948" class="mut" fill="#5d6f4e">→ writes config</text>
    <text x="100" y="978" fill="#16321a">POST /api/site/add</text><text x="320" y="978" class="mut" fill="#5d6f4e">→ assigns next port</text>
    <text x="540" y="978" fill="#16321a">POST /api/site/policy</text><text x="780" y="978" class="mut" fill="#5d6f4e">→ writes policies</text>
    <text x="1000" y="978" fill="#16321a">POST /api/command</text><text x="1210" y="978" class="mut" fill="#5d6f4e">→ writes commands</text>
  </g>

  <!-- =================== BAND 6 : WHERE IT REFLECTS =================== -->
  <g filter="url(#soft)"><rect x="60" y="1022" width="1360" height="138" rx="16" fill="#ffffff" stroke="#cfe0c2" stroke-width="1.6"/></g>
  <text x="84" y="1050" class="band" font-size="17">6 · Where each action reflects (end to end)</text>
  <line x1="470" y1="1062" x2="470" y2="1150" stroke="#e2ead9"/><line x1="760" y1="1062" x2="760" y2="1150" stroke="#e2ead9"/><line x1="1090" y1="1062" x2="1090" y2="1150" stroke="#e2ead9"/>
  <g font-size="11">
    <text x="84" y="1076" class="grn" font-size="11.5">Action</text><text x="484" y="1076" class="grn" font-size="11.5">Writes</text><text x="774" y="1076" class="grn" font-size="11.5">Streamer does</text><text x="1104" y="1076" class="grn" font-size="11.5">User / admin sees</text>
    <text x="84" y="1100" class="mut">Add whitelisted site</text><text x="484" y="1100" class="mono" fill="#3f7d22">config.json</text><text x="774" y="1100" class="mut">opens new port + spawns env</text><text x="1104" y="1100" class="mut">new HOST:port is live</text>
    <text x="84" y="1122" class="mut">Set a policy</text><text x="484" y="1122" class="mono" fill="#3f7d22">config.json</text><text x="774" y="1122" class="mut">gates next input (xdotool)</text><text x="1104" y="1122" class="mut">viewer lock popup updates</text>
    <text x="84" y="1144" class="mut">Stop a session</text><text x="484" y="1144" class="mono" fill="#9a7d12">commands.json</text><text x="774" y="1144" class="mut">closes that /ws</text><text x="1104" y="1144" class="mut">row leaves the dashboard</text>
  </g>
</svg>
